services:
  # 1. The FastAPI Docker Backend
  - type: web
    name: assistant-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free # Can be upgraded to 'starter' or 'standard' for production
    envVars:
      - key: PORT
        value: 10000
      # Link to the Render-managed database automatically generated below
      - key: DATABASE_URL
        fromDatabase:
          name: assistant-db
          property: connectionString
      # Secrets to be configured in Render's UI dashboard:
      - key: GEMINI_API_KEY
        sync: false
      - key: SESSION_SECRET_KEY
        sync: false
      # We will map FRONTEND_URL to the static site's URL after initial deploy
      - key: FRONTEND_URL
        value: https://executive-briefing-console.onrender.com

  # 2. The Vite React Frontend (Static CDN Site)
  - type: web
    name: assistant-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://assistant-backend.onrender.com # Change this to your backend's Render URL

# 3. Secure, Fully-Managed PostgreSQL Instance
databases:
  - name: assistant-db
    plan: free